name: Intelligence Pipeline
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "pipeline"
  cancel-in-progress: false
jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run intelligence pipeline
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
        run: npm run build
      - name: Commit updated data
        run: |
          git config user.name "piw-pipeline-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/latest.json data/meta.json
          git diff --cached --quiet && echo "No data changes" || git commit -m "chore: refresh intelligence data [skip ci]"

          # Retry the push a few times, rebasing on top of the remote each time.
          # This handles the race where a manual commit (e.g. a code fix pushed
          # by hand) lands on main in the few seconds between this job's
          # checkout and its push - instead of failing outright, we pull the
          # newer commits in, replay our data commit on top, and push again.
          attempt=1
          max_attempts=5
          until git push; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Push failed after $max_attempts attempts, giving up."
              exit 1
            fi
            echo "Push rejected (attempt $attempt/$max_attempts) - pulling and retrying..."
            git fetch origin main
            git rebase origin/main
            attempt=$((attempt + 1))
            sleep 3
          done
  deploy-pages:
    needs: build-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (latest, post-commit)
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
  deploy-cloudflare:
    needs: build-data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (latest, post-commit)
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Deploy to Cloudflare Pages (Direct Upload, doesn't count as a "build")
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=protective-intel-watch --branch=main
