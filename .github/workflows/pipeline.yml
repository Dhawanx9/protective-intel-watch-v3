name: Intelligence Pipeline
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "pipeline"
  cancel-in-progress: false
jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run intelligence pipeline
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
        run: npm run build
      - name: Commit updated data
        run: |
          git config user.name "piw-pipeline-bot"
          git config user.email "actions@users.noreply.github.com"

          # data/latest.json and data/meta.json are fully regenerated every
          # run - if a competing push landed on main in between our checkout
          # and push, there's no sensible line-by-line merge for these files
          # (that's what caused the rebase conflict). So instead of merging,
          # we keep our freshly-built copy aside, and if the push is rejected
          # we sync main to the remote's latest state and just reapply our
          # own version of these two files on top - no conflict possible,
          # since we always want our own freshly computed data to win.
          mkdir -p /tmp/piw-data-backup
          cp data/latest.json /tmp/piw-data-backup/latest.json
          cp data/meta.json /tmp/piw-data-backup/meta.json

          git add data/latest.json data/meta.json
          git diff --cached --quiet && echo "No data changes" || git commit -m "chore: refresh intelligence data [skip ci]"

          attempt=1
          max_attempts=5
          until git push; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Push failed after $max_attempts attempts, giving up."
              exit 1
            fi
            echo "Push rejected (attempt $attempt/$max_attempts) - syncing with remote and reapplying our data..."
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/piw-data-backup/latest.json data/latest.json
            cp /tmp/piw-data-backup/meta.json data/meta.json
            git add data/latest.json data/meta.json
            git diff --cached --quiet && echo "No data changes after resync" || git commit -m "chore: refresh intelligence data [skip ci]"
            attempt=$((attempt + 1))
            sleep 3
          done
  deploy-pages:
    needs: build-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (latest, post-commit)
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
  deploy-cloudflare:
    needs: build-data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (latest, post-commit)
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Deploy to Cloudflare (Workers with static assets, Direct Upload - doesn't count as a "build")
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
